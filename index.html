<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arcee AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
      --accent: #7c5cfc; --accent2: #c084fc;
      --text: #e8e8f0; --muted: #6b6b80;
    }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); flex-shrink: 0; }
    .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    header h1 { font-size: 1.1rem; font-weight: 800; }
    header span { font-size: 0.72rem; color: var(--muted); font-family: 'Space Mono', monospace; margin-left: auto; background: var(--border); padding: 3px 8px; border-radius: 20px; }
    #chat { flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { display: flex; gap: 10px; max-width: 780px; width: 100%; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai { align-self: flex-start; }
    .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .msg.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .msg.ai .avatar { background: var(--border); }
    .bubble { padding: 12px 16px; border-radius: 14px; font-size: 0.92rem; line-height: 1.65; max-width: calc(100% - 44px); white-space: pre-wrap; word-break: break-word; }
    .msg.user .bubble { background: #1a1a2e; border: 1px solid var(--accent); border-radius: 14px 4px 14px 14px; }
    .msg.ai .bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing-dots span { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }
    #welcome { text-align: center; margin: auto; padding: 32px 16px; }
    #welcome .big { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 8px; }
    #welcome .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .sug-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 20px; font-size: 0.82rem; cursor: pointer; font-family: 'Syne', sans-serif; transition: border-color 0.2s; }
    .sug-btn:hover { border-color: var(--accent); }
    #input-area { border-top: 1px solid var(--border); padding: 16px; background: var(--surface); flex-shrink: 0; }
    .input-wrap { max-width: 780px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: var(--accent); }
    #userInput { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.92rem; resize: none; max-height: 150px; line-height: 1.5; }
    #userInput::placeholder { color: var(--muted); }
    #sendBtn { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.15s; }
    #sendBtn:hover { opacity: 0.85; transform: scale(1.05); }
    #sendBtn:disabled { opacity: 0.4; cursor: default; transform: none; }
    #sendBtn svg { fill: white; width: 16px; height: 16px; }
    .footer-note { text-align: center; font-size: 0.7rem; color: var(--muted); margin-top: 8px; font-family: 'Space Mono', monospace; }
    .error-bubble { color: #f87171; }
  </style>
</head>
<body>
<header>
  <div class="logo">✦</div>
  <h1>Arcee AI</h1>
  <span>trinity-large-preview:free</span>
</header>

<div id="chat">
  <div id="welcome">
    <div class="big">Salom! 👋</div>
    <div class="sub">Arcee AI bilan suhbatlashing</div>
    <div class="suggestions">
      <button class="sug-btn" onclick="suggest(this)">Pythonda for loop nima?</button>
      <button class="sug-btn" onclick="suggest(this)">Insho yozishda yordam ber</button>
      <button class="sug-btn" onclick="suggest(this)">HTML nima?</button>
      <button class="sug-btn" onclick="suggest(this)">Menga qo'shiq yozing</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrap">
    <textarea id="userInput" rows="1" placeholder="Xabar yozing..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-note">API kalit xavfsiz — server tomonida saqlanadi 🔒</div>
</div>

<script>
  const chatEl  = document.getElementById("chat");
  const inputEl = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  let messages  = [];

  function suggest(btn) { inputEl.value = btn.textContent; autoResize(inputEl); inputEl.focus(); }
  function autoResize(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 150) + "px"; }
  function handleKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

  function addMsg(role, text, isTyping = false) {
    document.getElementById("welcome")?.remove();
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "👤" : "✦";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (isTyping) bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    else bubble.textContent = text;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = ""; inputEl.style.height = "auto"; sendBtn.disabled = true;
    addMsg("user", text);
    messages.push({ role: "user", content: text });
    const typingBubble = addMsg("ai", "", true);
    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      if (data.error) { typingBubble.innerHTML = `<span class="error-bubble">⚠️ ${data.error.message || data.error}</span>`; return; }
      const reply = data.choices?.[0]?.message?.content || "Javob kelmadi.";
      typingBubble.textContent = reply;
      messages.push({ role: "assistant", content: reply });
    } catch (err) {
      typingBubble.innerHTML = `<span class="error-bubble">⚠️ Xatolik: ${err.message}</span>`;
    } finally {
      sendBtn.disabled = false; inputEl.focus(); chatEl.scrollTop = chatEl.scrollHeight;
    }
  }
</script>
</body>
</html>
